<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Disc body -->
    <radialGradient id="disc" cx="0" cy="0" r="1"
                    gradientTransform="translate(689 716) rotate(-132) scale(775)"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#55C8F2"/>
      <stop offset="0.30" stop-color="#278FEF"/>
      <stop offset="0.64" stop-color="#176FDF"/>
      <stop offset="1" stop-color="#294CCB"/>
    </radialGradient>

    <!-- Merged data area -->
    <linearGradient id="dataBand"
                    x1="238" y1="220"
                    x2="814" y2="826"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#DDFDFF" stop-opacity="0.42"/>
      <stop offset="0.28" stop-color="#72E6FB" stop-opacity="0.24"/>
      <stop offset="0.58" stop-color="#2B86EB" stop-opacity="0.12"/>
      <stop offset="0.82" stop-color="#5A57E0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E0D8FF" stop-opacity="0.34"/>
    </linearGradient>

    <!-- Thick highlight ring in the middle of the data area -->
    <linearGradient id="midHighlight"
                    x1="236" y1="214"
                    x2="810" y2="828"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="0.30" stop-color="#D8FBFF" stop-opacity="0.72"/>
      <stop offset="0.54" stop-color="#A6E8FF" stop-opacity="0.24"/>
      <stop offset="0.76" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F0EAFF" stop-opacity="0.48"/>
    </linearGradient>

    <!-- Outer rim highlight instead of the old thick edge ring -->
    <linearGradient id="outerHighlight"
                    x1="212" y1="186"
                    x2="850" y2="920"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="0.26" stop-color="#D7FBFF" stop-opacity="0.72"/>
      <stop offset="0.56" stop-color="#A4E4FF" stop-opacity="0.18"/>
      <stop offset="0.82" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#EAE2FF" stop-opacity="0.56"/>
    </linearGradient>

    <!-- Subtle dark rim to keep the outer highlight from floating -->
    <linearGradient id="outerShadow"
                    x1="210" y1="182"
                    x2="850" y2="920"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B4EB7" stop-opacity="0.04"/>
      <stop offset="0.48" stop-color="#1B4EB7" stop-opacity="0.10"/>
      <stop offset="0.76" stop-color="#193D9F" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#472D9E" stop-opacity="0.34"/>
    </linearGradient>

    <!-- Center hub -->
    <radialGradient id="hub" cx="0" cy="0" r="1"
                    gradientTransform="translate(474 486) rotate(48) scale(170)"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#E9F7FF"/>
      <stop offset="1" stop-color="#BFD5F5"/>
    </radialGradient>

    <!-- Shadow -->
    <filter id="shadow"
            x="40" y="84" width="944" height="972"
            filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
      <feDropShadow
              dx="0"
              dy="52"
              stdDeviation="44"
              flood-color="#3158B6"
              flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Base disc -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="392" fill="url(#disc)"/>
  </g>

  <!-- Outer rim highlight -->
  <circle
          cx="512" cy="512" r="400"
          fill="none"
          stroke="url(#outerHighlight)"
          stroke-width="18"/>

  <circle
          cx="512" cy="512" r="400"
          fill="none"
          stroke="url(#outerShadow)"
          stroke-width="4"/>

  <!-- Data Bands -->
  <circle
          cx="512" cy="512" r="180"
          fill="none"
          stroke="url(#dataBand)"
          stroke-width="98"/>
  <circle
          cx="512" cy="512" r="300"
          fill="none"
          stroke="url(#dataBand)"
          stroke-width="98"/>

  <!-- One thicker highlight ring in the middle of the data band -->
  <circle
          cx="512" cy="512" r="245"
          fill="none"
          stroke="url(#midHighlight)"
          stroke-width="30"/>

  <!-- Center hub -->
  <circle cx="512" cy="512" r="104" fill="url(#hub)"/>
  <circle cx="512" cy="512" r="42" fill="#1C83EF"/>
</svg>